<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#23386B">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>Sign in · Spares Ledger</title>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#EEF0F3;--surface:#fff;--ink:#14181F;--muted:#69707C;--indigo:#23386B;--bleed:#C22F2F;--line:#DDE1E7}
*{box-sizing:border-box;margin:0}
body{background:var(--bg);font-family:'IBM Plex Sans',sans-serif;font-size:14px;color:var(--ink);
     min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:28px;width:100%;max-width:360px}
.brand{background:var(--indigo);color:#fff;border-radius:8px;padding:14px 16px;margin:-28px -28px 22px;border-radius:12px 12px 0 0}
.brand h1{font-family:'Archivo',sans-serif;font-weight:800;font-size:18px;letter-spacing:.5px;text-transform:uppercase}
.brand p{font-size:11.5px;opacity:.75;margin-top:2px}
label{display:block;font-family:'Archivo',sans-serif;font-weight:600;font-size:10.5px;letter-spacing:.8px;
      text-transform:uppercase;color:var(--muted);margin:14px 0 5px}
input{width:100%;border:1px solid var(--line);border-radius:6px;padding:10px;font:inherit}
input:focus,button:focus-visible{outline:2px solid var(--indigo);outline-offset:1px}
button{width:100%;margin-top:20px;background:var(--indigo);color:#fff;border:none;border-radius:6px;
       padding:11px;font:inherit;font-weight:600;cursor:pointer}
button:hover{background:#1a2b54}
.err{color:var(--bleed);font-size:12.5px;margin-top:12px;min-height:16px}
</style>
</head>
<body>
<form class="card" id="f">
  <div class="brand"><h1>Spares Ledger</h1><p>Interloop · Knitting · spare-parts consumption</p></div>
  <label for="u">Username</label>
  <input id="u" autocomplete="username" autofocus>
  <label for="p">Password</label>
  <input id="p" type="password" autocomplete="current-password">
  <button type="submit">Sign in</button>
  <div class="err" id="err"></div>
</form>
<script>
document.getElementById('f').onsubmit = async e => {
  e.preventDefault();
  const r = await fetch('/api/login', {method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({username: document.getElementById('u').value, password: document.getElementById('p').value})});
  if (r.ok) location.href = '/';
  else document.getElementById('err').textContent = (await r.json()).error || 'Sign-in failed.';
};
</script>
</body>
</html>
